<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us - Questionify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#e91e63',
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-50 min-h-screen font-sans antialiased">

  <!-- Top Bar (same as other pages) -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
      <div class="flex items-center space-x-4">
        <img src="/public/image folder/logo.svg" alt="Questionify Logo" class="h-10 w-10" />
        <div class="text-2xl font-bold text-primary">Questionify</div>
        <span class="text-gray-500 font-medium">Contact</span>
      </div>

      <div class="flex items-center space-x-6">
        <div class="relative hidden sm:block">
          <input type="text" placeholder="Search..."
            class="w-64 pl-10 pr-4 py-2 rounded-full border border-gray-300 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition text-sm" />
          <svg class="absolute left-3 top-2.5 h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>

        <div class="flex items-center space-x-4">
          <button class="relative p-2 text-gray-500 hover:text-primary transition">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
            <span class="absolute top-0 right-0 h-2 w-2 bg-red-500 rounded-full"></span>
          </button>

          <div class="flex items-center space-x-2">
            <img
              src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=128&h=128&q=80"
              alt="User Avatar" class="w-10 h-10 rounded-full object-cover border-2 border-primary" />
            <span class="font-medium text-gray-800 hidden md:block">Ashley Smith</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="flex min-h-screen">
    <!-- Sidebar (same as other pages) -->
    <aside class="hidden md:block w-64 bg-white shadow-md h-screen sticky top-0 pt-8 overflow-y-auto">
      <nav class="px-4 space-y-2 overflow-x-hidden">
        <a href="dashboard.html"
          class="flex items-center px-3 py-2.5 text-gray-700 hover:bg-gray-100 rounded-xl transition truncate whitespace-nowrap overflow-hidden">
          <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
          Dashboard
        </a>

        <a href="#"
          class="flex items-center px-3 py-2.5 text-primary bg-primary/10 rounded-xl font-medium truncate whitespace-nowrap overflow-hidden">
          <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
          Contact
        </a>

        <!-- Add other links like FAQ, Pricing, etc. -->
      </nav>
      <button onclick="history.back()"
        class="fixed bottom-6 left-6 z-50 bg-primary text-white px-5 py-3 rounded-full shadow-xl hover:bg-pink-700 transition flex items-center space-x-2">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        <span>Back</span>
      </button>

    </aside>

    <!-- Main Contact Content -->
    <main class="flex-1 p-6 md:p-10 bg-white">
      <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-2 text-center md:text-left">
        Get in Touch
      </h1>
      <p class="text-gray-600 mb-10 text-center md:text-left">
        We would love to hear from you!
      </p>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 max-w-5xl mx-auto">
        <!-- Left: Contact Info -->
        <div class="space-y-8">
          <div>
            <h3 class="text-xl font-semibold text-gray-800 mb-3">Send us a mail</h3>
            <p class="text-gray-600 flex items-center">
              <span class="text-primary mr-2">✉</span>
              Questionify2025@gmail.com
            </p>
          </div>

          <div>
            <h3 class="text-xl font-semibold text-gray-800 mb-3">WhatsApp</h3>
            <p class="text-gray-600 flex items-center">
              <span class="text-green-600 mr-2">WhatsApp</span>
              +2347025557492
            </p>
          </div>

          <div>
            <h3 class="text-xl font-semibold text-gray-800 mb-3">Support Hours</h3>
            <p class="text-gray-600">
              Monday–Friday: 9:00am–6:00pm<br>
              Saturday: 10:00am–5:00pm
            </p>
          </div>
        </div>

        <!-- Right: Contact Form -->
        <div class="bg-gray-50 p-8 rounded-2xl shadow-lg">
          <form class="space-y-6">
            <div>
              <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
              <input type="text" id="name"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition"
                placeholder="Your full name" required />
            </div>

            <div>
              <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email ID</label>
              <input type="email" id="email"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition"
                placeholder="Your Email ID" required />
            </div>

            <div>
              <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Message</label>
              <textarea id="message" rows="6"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition"
                placeholder="Your Message" required></textarea>
            </div>

            <button type="submit"
              class="w-full py-3 bg-primary text-white font-semibold rounded-lg hover:bg-pink-700 transition focus:outline-none focus:ring-4 focus:ring-primary/30">
              Submit
            </button>
          </form>
        </div>
      </div>
    </main>
  </div>

</body>

</html>
